<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>DamirovGym</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1c1c1c;
    --accent: #e8ff3c;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --border: #2a2a2a;
    --green: #3cffa0;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  #home {
    background: var(--bg);
    padding: 0;
  }

  .home-header {
    padding: 52px 24px 24px;
    background: linear-gradient(180deg, #111 0%, transparent 100%);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span { color: var(--text); }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .day-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px 24px 40px;
    flex: 1;
  }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  .day-card:active { transform: scale(0.98); background: #222; }

  .day-card.completed { border-color: var(--green); }
  .day-card.completed::after {
    content: '✓';
    position: absolute;
    right: 20px;
    font-size: 18px;
    color: var(--green);
    font-weight: 700;
  }

  .day-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .push-icon { background: rgba(255,107,53,0.15); }
  .pull-icon { background: rgba(60,255,160,0.15); }
  .off-icon  { background: rgba(232,255,60,0.12); }

  .day-info { flex: 1; }

  .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .day-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .day-progress {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .day-progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ── WORKOUT SCREEN ── */
  #workout {
    background: var(--bg);
  }

  .workout-header {
    padding: 52px 24px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .back-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.1s;
  }
  .back-btn:active { background: #333; }

  .workout-title-block { flex: 1; }

  .workout-day-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .workout-ex-count {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .exercises-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 120px;
  }

  .exercise-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .exercise-block.ex-done { border-color: var(--green); }

  .exercise-header {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }

  .ex-num {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    color: var(--muted);
  }

  .ex-done .ex-num {
    background: var(--green);
    color: var(--bg);
  }

  .ex-name {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }

  .ex-sets-label {
    font-size: 12px;
    color: var(--muted);
  }

  .sets-container {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .set-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    transition: all 0.15s;
    cursor: pointer;
  }

  .set-row.done {
    border-color: var(--green);
    background: rgba(60,255,160,0.05);
  }

  .set-row:active { transform: scale(0.98); }

  .set-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.15s;
    color: var(--muted);
  }

  .set-row.done .set-circle {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
  }

  .set-info { flex: 1; }

  .set-label {
    font-size: 14px;
    font-weight: 500;
  }

  .set-reps {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .set-status {
    font-size: 12px;
    color: var(--muted);
  }

  .set-row.done .set-status { color: var(--green); }

  /* ── TIMER OVERLAY ── */
  #timer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    backdrop-filter: blur(6px);
  }

  #timer-overlay.visible { display: flex; }

  .timer-label {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .timer-ring {
    position: relative;
    width: 180px;
    height: 180px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
  }

  .timer-ring circle.bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .timer-ring circle.progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear;
    stroke-dasharray: 502;
    stroke-dashoffset: 0;
  }

  .timer-count {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .timer-seconds {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 1;
    color: var(--accent);
  }

  .timer-sub {
    font-size: 13px;
    color: var(--muted);
  }

  .timer-next-info {
    font-size: 14px;
    color: var(--text);
    text-align: center;
    max-width: 260px;
  }

  .timer-skip-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 40px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .timer-skip-btn:active { background: #333; transform: scale(0.97); }

  /* ── DONE SCREEN ── */
  #done {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 30px;
    gap: 20px;
  }

  .done-emoji { font-size: 64px; }

  .done-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .done-stats {
    display: flex;
    gap: 20px;
    margin: 10px 0;
  }

  .done-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    text-align: center;
  }

  .done-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--green);
  }

  .done-stat-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .done-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 16px 48px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    max-width: 300px;
    transition: opacity 0.15s;
  }

  .done-btn:active { opacity: 0.8; }

  /* ── BOTTOM TIMER BAR ── */
  #mini-timer {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 12px 20px;
    z-index: 50;
    align-items: center;
    gap: 12px;
  }

  #mini-timer.visible { display: flex; }

  .mini-timer-label { font-size: 13px; color: var(--muted); flex: 1; }
  .mini-timer-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--accent);
  }

  .mini-skip {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ── RESET ── */
  .reset-btn {
    background: transparent;
    border: 1px solid #444;
    color: var(--muted);
    border-radius: 8px;
    padding: 5px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .reset-btn:active { background: #2a2a2a; color: var(--accent2); border-color: var(--accent2); }

  .workout-reset-btn {
    background: transparent;
    border: 1px solid #333;
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .workout-reset-btn:active { color: var(--accent2); border-color: var(--accent2); }
</style>
</head>
<body>

<!-- ═══════════════ HOME ═══════════════ -->
<div id="home" class="screen active">
  <div class="home-header">
    <div class="logo">Damirov<span>Gym</span></div>
    <div class="subtitle">Ton programme · Push Pull Split</div>
  </div>
  <div class="day-grid" id="day-grid"></div>
</div>

<!-- ═══════════════ WORKOUT ═══════════════ -->
<div id="workout" class="screen">
  <div class="workout-header">
    <div class="back-btn" onclick="goHome()">←</div>
    <div class="workout-title-block">
      <div class="workout-day-label" id="workout-title">PUSH A</div>
      <div class="workout-ex-count" id="workout-meta"></div>
    </div>
    <button class="workout-reset-btn" onclick="resetCurrentDay()">↺ Reset</button>
  </div>
  <div class="exercises-list" id="exercises-list"></div>
</div>

<!-- ═══════════════ DONE ═══════════════ -->
<div id="done" class="screen">
  <div class="done-emoji">💪</div>
  <div class="done-title">SÉANCE TERMINÉE</div>
  <div class="done-stats">
    <div class="done-stat">
      <div class="done-stat-val" id="done-sets">0</div>
      <div class="done-stat-label">Séries</div>
    </div>
    <div class="done-stat">
      <div class="done-stat-val" id="done-time">0</div>
      <div class="done-stat-label">Min</div>
    </div>
  </div>
  <button class="done-btn" onclick="goHome()">Retour à l'accueil</button>
</div>

<!-- ═══════════════ TIMER OVERLAY ═══════════════ -->
<div id="timer-overlay">
  <div class="timer-label">REPOS</div>
  <div class="timer-ring">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle class="bg" cx="90" cy="90" r="80"/>
      <circle class="progress" id="timer-circle" cx="90" cy="90" r="80"/>
    </svg>
    <div class="timer-count">
      <div class="timer-seconds" id="timer-display">1:30</div>
      <div class="timer-sub">secondes</div>
    </div>
  </div>
  <div class="timer-next-info" id="timer-next"></div>
  <button class="timer-skip-btn" onclick="skipTimer()">Passer le repos →</button>
</div>

<script>
// ─── DATA ───
const PROGRAM = [
  {
    id: 'pushA', name: 'PUSH A', icon: '🔥', type: 'push',
    exercises: [
      { name: 'Dips lestés', sets: 4, reps: '4–8' },
      { name: 'Pompes classiques lestées', sets: 4, reps: '8–15' },
      { name: 'Pompes pieds surélevés', sets: 3, reps: '8–15' },
      { name: 'Élévations latérales', sets: 3, reps: '15–20' },
      { name: 'Skullcrusher / Extension triceps', sets: 3, reps: '10–15' },
    ]
  },
  {
    id: 'pullA', name: 'PULL A', icon: '💪', type: 'pull',
    exercises: [
      { name: 'Pull-ups pronation large lestés', sets: 4, reps: '4–8' },
      { name: 'Chin-ups', sets: 3, reps: '6–12' },
      { name: 'Rowing haltère unilatéral', sets: 4, reps: '10–12' },
      { name: 'Tractions australiennes', sets: 3, reps: '10–15' },
      { name: 'Oiseau', sets: 3, reps: '8' },
      { name: 'Curl biceps', sets: 3, reps: '10–12' },
      { name: 'Curl marteau', sets: 3, reps: '10–12' },
    ]
  },
  {
    id: 'pushB', name: 'PUSH B', icon: '🔥', type: 'push',
    exercises: [
      { name: 'Dips poids du corps', sets: 4, reps: '8–15' },
      { name: 'Pompes pieds surélevés', sets: 4, reps: '8–15' },
      { name: 'Pompes serrées', sets: 3, reps: '8–15' },
      { name: 'Élévations latérales', sets: 3, reps: '15–20' },
      { name: 'Skullcrusher / Extension triceps', sets: 3, reps: '10–15' },
    ]
  },
  {
    id: 'pullB', name: 'PULL B', icon: '💪', type: 'pull',
    exercises: [
      { name: 'Neutral grip pull-ups', sets: 4, reps: '6–12' },
      { name: 'Chin-ups / Pull-ups poids du corps', sets: 3, reps: '6–10' },
      { name: 'Rowing haltère unilatéral', sets: 4, reps: '10–12' },
      { name: 'Tractions australiennes', sets: 3, reps: '10–15' },
      { name: 'Curl biceps', sets: 3, reps: '10–12' },
      { name: 'Curl marteau', sets: 3, reps: '10–12' },
    ]
  },
  {
    id: 'off', name: 'OFF / CORE', icon: '🧘', type: 'off',
    exercises: [
      { name: 'Dead hang', sets: 4, reps: '20–45 sec' },
      { name: 'Dead hang knee raises', sets: 3, reps: '8–12' },
      { name: 'Vacuum', sets: 3, reps: '15–30 sec' },
      { name: 'Planche latérale', sets: 3, reps: '20–40 sec / côté' },
      { name: 'Reverse crunch', sets: 3, reps: '12–20' },
    ]
  },
];

const REST_DURATION = 90; // 1min30
const state = {
  dayId: null,
  setsDone: {},      // { "exIdx-setIdx": true }
  startTime: null,
  timerInterval: null,
  timerRemaining: 0,
};

// ─── STORAGE ───
function saveProgress() {
  const data = {};
  PROGRAM.forEach(d => {
    const key = `damirov_${d.id}`;
    data[d.id] = JSON.parse(localStorage.getItem(key) || '{}');
  });
  if (state.dayId) {
    localStorage.setItem(`damirov_${state.dayId}`, JSON.stringify(state.setsDone));
  }
}

function loadDayProgress(dayId) {
  return JSON.parse(localStorage.getItem(`damirov_${dayId}`) || '{}');
}

function isDayCompleted(day) {
  const saved = loadDayProgress(day.id);
  const totalSets = day.exercises.reduce((s, e) => s + e.sets, 0);
  return Object.keys(saved).length >= totalSets;
}

function getDayProgress(day) {
  const saved = loadDayProgress(day.id);
  const totalSets = day.exercises.reduce((s, e) => s + e.sets, 0);
  return { done: Object.keys(saved).length, total: totalSets };
}

// ─── HOME ───
function renderHome() {
  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  PROGRAM.forEach(day => {
    const completed = isDayCompleted(day);
    const prog = getDayProgress(day);
    const pct = Math.round((prog.done / prog.total) * 100);
    const iconClass = day.type === 'push' ? 'push-icon' : day.type === 'pull' ? 'pull-icon' : 'off-icon';
    const card = document.createElement('div');
    card.className = `day-card${completed ? ' completed' : ''}`;
    card.innerHTML = `
      <div class="day-icon ${iconClass}">${day.icon}</div>
      <div class="day-info">
        <div class="day-name">${day.name}</div>
        <div class="day-meta">${day.exercises.length} exercices · ${prog.total} séries</div>
        <div class="day-progress">
          <div class="day-progress-bar" style="width:${pct}%"></div>
        </div>
      </div>
      ${completed ? `<button class="reset-btn" onclick="event.stopPropagation(); resetDay('${day.id}')">↺</button>` : ''}
    `;
    card.onclick = () => startWorkout(day.id);
    grid.appendChild(card);
  });
}

// ─── WORKOUT ───
function startWorkout(dayId) {
  state.dayId = dayId;
  state.setsDone = loadDayProgress(dayId);
  state.startTime = Date.now();
  const day = PROGRAM.find(d => d.id === dayId);

  document.getElementById('workout-title').textContent = day.name;
  const total = day.exercises.reduce((s, e) => s + e.sets, 0);
  document.getElementById('workout-meta').textContent =
    `${day.exercises.length} exercices · ${total} séries · Repos 1min30`;

  renderExercises(day);
  showScreen('workout');
}

function renderExercises(day) {
  const list = document.getElementById('exercises-list');
  list.innerHTML = '';
  day.exercises.forEach((ex, ei) => {
    const allDone = Array.from({ length: ex.sets }, (_, si) => `${ei}-${si}`)
      .every(k => state.setsDone[k]);

    const block = document.createElement('div');
    block.className = `exercise-block${allDone ? ' ex-done' : ''}`;
    block.id = `ex-${ei}`;

    let setsHTML = '';
    for (let si = 0; si < ex.sets; si++) {
      const key = `${ei}-${si}`;
      const done = !!state.setsDone[key];
      setsHTML += `
        <div class="set-row${done ? ' done' : ''}" id="set-${ei}-${si}" onclick="toggleSet(${ei},${si})">
          <div class="set-circle">${si + 1}</div>
          <div class="set-info">
            <div class="set-label">Série ${si + 1}</div>
            <div class="set-reps">${ex.reps} reps</div>
          </div>
          <div class="set-status">${done ? 'Fait ✓' : '–'}</div>
        </div>`;
    }

    block.innerHTML = `
      <div class="exercise-header">
        <div class="ex-num">${ei + 1}</div>
        <div class="ex-name">${ex.name}</div>
        <div class="ex-sets-label">${ex.sets}×${ex.reps}</div>
      </div>
      <div class="sets-container">${setsHTML}</div>
    `;
    list.appendChild(block);
  });
}

function toggleSet(ei, si) {
  const key = `${ei}-${si}`;
  const day = PROGRAM.find(d => d.id === state.dayId);
  const ex = day.exercises[ei];

  if (state.setsDone[key]) {
    delete state.setsDone[key];
    updateSetUI(ei, si, false);
  } else {
    state.setsDone[key] = true;
    updateSetUI(ei, si, true);

    // Check if more sets remain in this exercise
    const nextSet = si + 1;
    const nextExInfo = nextSet < ex.sets
      ? `${ex.name} · Série ${nextSet + 1}`
      : ei + 1 < day.exercises.length
        ? `Prochain : ${day.exercises[ei + 1].name}`
        : 'Dernière série ! 🎉';

    startRestTimer(nextExInfo);
  }

  // Update exercise block done state
  const allDone = Array.from({ length: ex.sets }, (_, s) => `${ei}-${s}`)
    .every(k => state.setsDone[k]);
  document.getElementById(`ex-${ei}`).classList.toggle('ex-done', allDone);

  saveProgress();
  checkWorkoutComplete(day);
}

function updateSetUI(ei, si, done) {
  const row = document.getElementById(`set-${ei}-${si}`);
  if (!row) return;
  row.classList.toggle('done', done);
  row.querySelector('.set-status').textContent = done ? 'Fait ✓' : '–';
}

function checkWorkoutComplete(day) {
  const total = day.exercises.reduce((s, e) => s + e.sets, 0);
  if (Object.keys(state.setsDone).length >= total) {
    setTimeout(() => {
      stopTimer();
      const elapsed = Math.round((Date.now() - state.startTime) / 60000);
      document.getElementById('done-sets').textContent = total;
      document.getElementById('done-time').textContent = elapsed;
      showScreen('done');
    }, 800);
  }
}

// ─── TIMER ───
function startRestTimer(nextInfo) {
  stopTimer();
  state.timerRemaining = REST_DURATION;
  document.getElementById('timer-next').textContent = nextInfo;
  updateTimerDisplay();
  document.getElementById('timer-overlay').classList.add('visible');

  state.timerInterval = setInterval(() => {
    state.timerRemaining--;
    updateTimerDisplay();
    if (state.timerRemaining <= 0) {
      stopTimer();
      // vibrate if available
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const s = state.timerRemaining;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  document.getElementById('timer-display').textContent =
    `${m}:${String(sec).padStart(2, '0')}`;

  const circle = document.getElementById('timer-circle');
  const circumference = 502;
  const pct = s / REST_DURATION;
  circle.style.strokeDashoffset = circumference * (1 - pct);
}

function stopTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  document.getElementById('timer-overlay').classList.remove('visible');
}

function skipTimer() { stopTimer(); }

// ─── RESET ───
function resetDay(dayId) {
  if (!confirm('Réinitialiser cette séance ?')) return;
  localStorage.removeItem(`damirov_${dayId}`);
  renderHome();
}

function resetCurrentDay() {
  if (!confirm('Réinitialiser cette séance ?')) return;
  localStorage.removeItem(`damirov_${state.dayId}`);
  state.setsDone = {};
  stopTimer();
  const day = PROGRAM.find(d => d.id === state.dayId);
  renderExercises(day);
}

// ─── NAV ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopTimer();
  renderHome();
  showScreen('home');
}

// ─── INIT ───
renderHome();
</script>
</body>
</html>
